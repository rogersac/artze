<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Met Art Fullscreen Display</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #f5f5f5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
    }

    .setup {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    p {
      color: #ccc;
      line-height: 1.5;
    }

    .card {
      background: #1d1d1d;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
      margin-top: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input:not([type="checkbox"]), select, button {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
      border-radius: 10px;
      border: 1px solid #444;
      padding: 12px;
      background: #111;
      color: #fff;
    }

    button {
      margin-top: 22px;
      cursor: pointer;
      background: #f5f5f5;
      color: #111;
      border: none;
      font-weight: 700;
    }

    button:hover {
      background: #ddd;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      color: #aaa;
      min-height: 24px;
    }

    .toggle-field {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    .toggle-field label {
      margin: 0;
    }

    .toggle-field input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: #f5f5f5;
      flex: 0 0 auto;
    }

    .viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    .viewer.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewer img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
    }

    .caption {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 18px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
      color: #fff;
      font-size: 0.95rem;
      text-shadow: 0 1px 2px #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .viewer.show-controls .caption,
    .viewer.caption-always-visible .caption {
      opacity: 1;
    }

    .controls {
      position: fixed;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .viewer.show-controls .controls {
      opacity: 1;
      pointer-events: auto;
    }

    .controls button {
      width: auto;
      margin: 0;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.85);
    }

    .hint {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 200ms ease;
    }

    .viewer.show-controls .hint {
      opacity: 1;
    }
  </style>
</head>
<body>
  <main class="setup" id="setup">
    <h1>Met Art Fullscreen Display</h1>
    <p>
      Search the Metropolitan Museum of Art collection and display public domain paintings fullscreen.
      This page runs entirely in your browser and is hosted on https://github.com/rogersac/artze.
    </p>

    <section class="card">
      <label for="query">Search term</label>
      <input id="query" value="Monet" placeholder="Examples: Monet, landscape, flowers, Van Gogh" />

      <label for="duration">Seconds per painting</label>
      <input id="duration" type="number" min="5" max="3600" value="60" />

      <label for="limit">Maximum paintings to load</label>
      <input id="limit" type="number" min="5" max="100" value="30" />

      <label for="department">Department</label>
      <select id="department">
        <option value="">Any department</option>
        <option value="11">European Paintings</option>
        <option value="21">Modern and Contemporary Art</option>
        <option value="2">American Paintings and Sculpture</option>
        <option value="6">Asian Art</option>
      </select>

      <label for="orientation">Image orientation</label>
      <select id="orientation">
        <option value="any">Any orientation</option>
        <option value="horizontal">Horizontal / landscape</option>
        <option value="vertical">Vertical / portrait</option>
        <option value="square">Square</option>
      </select>

      <div class="toggle-field">
        <input id="captionAlwaysVisible" type="checkbox" checked />
        <label for="captionAlwaysVisible">Always show caption</label>
      </div>

      <button id="displayButton">Display</button>
      <div class="status" id="status"></div>
    </section>
  </main>

  <section class="viewer" id="viewer">
    <img id="artImage" alt="Artwork from the Metropolitan Museum of Art" />
    <div class="caption" id="caption"></div>
    <div class="hint">Tap/click for controls · Right arrow for next · Esc to stop</div>
    <div class="controls">
      <button id="nextButton">Next</button>
      <button id="stopButton">Stop</button>
    </div>
  </section>

  <script>
    const MET_API_BASE = "https://collectionapi.metmuseum.org/public/collection/v1";

    const setup = document.getElementById("setup");
    const viewer = document.getElementById("viewer");
    const artImage = document.getElementById("artImage");
    const caption = document.getElementById("caption");
    const status = document.getElementById("status");
    const displayButton = document.getElementById("displayButton");
    const captionAlwaysVisible = document.getElementById("captionAlwaysVisible");
    const nextButton = document.getElementById("nextButton");
    const stopButton = document.getElementById("stopButton");

    let artworkIds = [];
    let artworkCache = new Map();
    let currentIndex = -1;
    let timerId = null;
    let controlsTimerId = null;
    let durationMs = 60000;
    let isAdvancingArtwork = false;
    let currentOrientationFilter = "any";
    let displaySessionId = 0;

    displayButton.addEventListener("click", startDisplay);
    captionAlwaysVisible.addEventListener("change", applyCaptionDisplaySetting);
    nextButton.addEventListener("click", showNextArtwork);
    stopButton.addEventListener("click", stopDisplay);
    viewer.addEventListener("click", showControlsTemporarily);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") stopDisplay();
      if (event.key === "ArrowRight") showNextArtwork();
    });

    async function startDisplay() {
      const query = document.getElementById("query").value.trim();
      const departmentId = document.getElementById("department").value;
      const limit = Number(document.getElementById("limit").value || 30);
      const durationSeconds = Number(document.getElementById("duration").value || 60);
      const selectedOrientation = document.getElementById("orientation").value;

      if (!query) {
        status.textContent = "Please enter a search term.";
        return;
      }

      durationMs = Math.max(5, durationSeconds) * 1000;
      currentOrientationFilter = selectedOrientation;
      displayButton.disabled = true;
      status.textContent = "Searching the Met collection...";

      try {
        artworkIds = await loadArtworkIds(query, departmentId, limit);
        artworkCache = new Map();

        if (artworkIds.length === 0) {
          status.textContent = "No matching objects were found. Try another search.";
          return;
        }

        currentIndex = -1;
        setup.style.display = "none";
        viewer.classList.add("active");
        applyCaptionDisplaySetting();
        caption.innerHTML = "Loading artwork...";
        displaySessionId += 1;

        await requestFullscreenIfAvailable(viewer);
        await showNextArtwork();
        showControlsTemporarily();
      } catch (error) {
        console.error(error);
        status.textContent = "Something went wrong while loading artwork. Try another search.";
      } finally {
        displayButton.disabled = false;
      }
    }

    async function loadArtworkIds(query, departmentId, limit) {
      const params = new URLSearchParams({
        q: query,
        hasImages: "true",
        isHighlight: "false"
      });

      if (departmentId) {
        params.set("departmentId", departmentId);
      }

      const searchUrl = `${MET_API_BASE}/search?${params.toString()}`;
      const searchResponse = await fetch(searchUrl);
      const searchData = await searchResponse.json();
      const ids = (searchData.objectIDs || []).slice(0, Math.max(limit * 3, limit));

      status.textContent = `Found ${ids.length} candidates. Starting display...`;
      return shuffle(ids);
    }

    async function showArtwork(index) {
      const artworkId = artworkIds[index];
      if (!artworkId) return false;

      const sessionId = displaySessionId;
      const artwork = await loadArtworkDetail(artworkId);
      if (!artwork || sessionId !== displaySessionId || !viewer.classList.contains("active")) return false;

      artImage.src = artwork.image;
      artImage.alt = `${artwork.title} by ${artwork.artist}`;
      caption.innerHTML = `
        <strong>${escapeHtml(artwork.title)}</strong>
        ${artwork.artist ? ` — ${escapeHtml(artwork.artist)}` : ""}
        ${artwork.date ? ` (${escapeHtml(artwork.date)})` : ""}
        <br />Image and metadata from The Metropolitan Museum of Art Open Access collection.
      `;

      resetTimer();
      return true;
    }

    async function showNextArtwork() {
      if (artworkIds.length === 0 || isAdvancingArtwork) return;

      isAdvancingArtwork = true;
      clearTimeout(timerId);

      try {
        for (let attempt = 0; attempt < artworkIds.length; attempt += 1) {
          const nextIndex = (currentIndex + 1 + attempt) % artworkIds.length;
          const didShowArtwork = await showArtwork(nextIndex);

          if (didShowArtwork) {
            currentIndex = nextIndex;
            return;
          }
        }

        caption.textContent = "No paintings with usable images were found for this search.";
      } finally {
        isAdvancingArtwork = false;
      }
    }

    function resetTimer() {
      clearTimeout(timerId);
      timerId = setTimeout(showNextArtwork, durationMs);
    }

    async function stopDisplay() {
      clearTimeout(timerId);
      clearTimeout(controlsTimerId);
      displaySessionId += 1;
      viewer.classList.remove("active", "show-controls", "caption-always-visible");
      setup.style.display = "block";
      artImage.removeAttribute("src");
      caption.textContent = "";

      if (document.fullscreenElement) {
        try {
          await document.exitFullscreen();
        } catch (error) {
          console.warn("Could not exit fullscreen", error);
        }
      }
    }

    function showControlsTemporarily() {
      viewer.classList.add("show-controls");
      clearTimeout(controlsTimerId);
      controlsTimerId = setTimeout(() => {
        viewer.classList.remove("show-controls");
      }, 3000);
    }

    function applyCaptionDisplaySetting() {
      viewer.classList.toggle("caption-always-visible", captionAlwaysVisible.checked);
    }

    async function loadArtworkDetail(artworkId) {
      if (artworkCache.has(artworkId)) {
        return artworkCache.get(artworkId);
      }

      try {
        const response = await fetch(`${MET_API_BASE}/objects/${artworkId}`);
        const object = await response.json();
        const isPainting = (object.classification || "").toLowerCase().includes("paintings")
          || (object.objectName || "").toLowerCase().includes("painting");

        if (!object.isPublicDomain || !object.primaryImage || !isPainting) {
          artworkCache.set(artworkId, null);
          return null;
        }

        const imageOrientation = await getImageOrientation(object.primaryImage);

        if (currentOrientationFilter !== "any" && imageOrientation !== currentOrientationFilter) {
          artworkCache.set(artworkId, null);
          return null;
        }

        const artwork = {
          title: object.title || "Untitled",
          artist: object.artistDisplayName || "Unknown artist",
          date: object.objectDate || "",
          image: object.primaryImage,
          metUrl: object.objectURL || "",
          orientation: imageOrientation
        };

        artworkCache.set(artworkId, artwork);
        return artwork;
      } catch (error) {
        console.warn(`Could not load object ${artworkId}`, error);
        artworkCache.set(artworkId, null);
        return null;
      }
    }

    async function requestFullscreenIfAvailable(element) {
      if (element.requestFullscreen) {
        try {
          await element.requestFullscreen();
        } catch (error) {
          console.warn("Fullscreen request was blocked or unavailable", error);
        }
      }
    }

    function getImageOrientation(imageUrl) {
      return new Promise((resolve) => {
        const img = new Image();

        img.onload = () => {
          const width = img.naturalWidth;
          const height = img.naturalHeight;

          if (!width || !height) {
            resolve("unknown");
          } else if (width > height) {
            resolve("horizontal");
          } else if (height > width) {
            resolve("vertical");
          } else {
            resolve("square");
          }
        };

        img.onerror = () => resolve("unknown");
        img.src = imageUrl;
      });
    }

    function shuffle(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
